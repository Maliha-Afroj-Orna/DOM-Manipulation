<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events Summary</title>
</head>
<body>
    <h1>DOM Events Summary</h1>
    <input id="name-input" type="text" placeholder="Your Name">
    <button onclick="addName()">Add Name</button>
    <button id="btn-add-name">Add Name 2</button>
    <div id="name-container">

    </div>


    <script>
        function addName() {
            const nameInput = document.getElementById('name-input');
            const newName = nameInput.value;

            // parent
            const nameContainer = document.getElementById('name-container');
            // create p
            const pElement = document.createElement('p');
            pElement.innerText = newName;
            // append
            nameContainer.appendChild(pElement);

            // clean the input field
            nameInput.value = '';   
        }

        // addEventListener()
        document.getElementById('btn-add-name').addEventListener('click', function() {
            
        })
    </script>
</body>
</html>
